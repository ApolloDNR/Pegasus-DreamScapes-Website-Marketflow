name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: npm test
    runs-on: ubuntu-latest
    env:
      AI_INTEGRATIONS_OPENAI_API_KEY: ci-test-key
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test
